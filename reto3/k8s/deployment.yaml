apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordersystem-api
  namespace: ordersystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ordersystem-api
  template:
    metadata:
      labels:
        app: ordersystem-api
    spec:
      containers:
        - name: ordersystem-api
          image: ordersystem-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ordersystem-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-api
  namespace: ordersystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-api
  template:
    metadata:
      labels:
        app: notifications-api
    spec:
      containers:
        - name: notifications-api
          image: notifications-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
